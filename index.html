<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><style>
 
:root {
  --font-main-title: 1.6rem;
  --font-def-title: 2.2rem;
  --font-group-title: 1.4rem;
  --font-letters-title: 1.1rem;
  --font-heb-word: 1.2rem;
  --font-niqqud: 1.2rem;
  --font-en-word: 1.1rem;
  --icon-size: 20px;
  --link-blue: #1a73e8;
  --bg-main: #f2f4f7;
  --bg-white: #fff;
  --text-dark: #202124;
  --text-gray: #5f6368;
  --max-page-width: 760px;
}

html, body {
  margin: 0; padding: 0; width: 100%;
  background: var(--bg-main);
  font-family: 'Heebo', sans-serif;
  direction: rtl;  
  text-align: right;
}

.page {
  max-width: var(--max-page-width);
  margin: 0 auto;
  padding: 1rem 1.2rem;
  background: var(--bg-white);
  box-sizing: border-box;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

 
header {
  background: var(--bg-white);
  border-bottom: 1px solid #e6e6e6;
  margin-bottom: 1rem;
}

header h1 {
  margin: 0;
  font-size: var(--font-main-title);
  font-weight: 800;
  color: var(--text-dark);
}

 
.intro-text {
  font-size: 0.95rem;
  color: var(--text-gray);
  line-height: 1.5;
  margin-bottom: 1.5rem;
}

 
.definition-header-box {
  background-color: #f1f3f4;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 20px;
  border: 1px solid #dadce0;
}

.definition-title {
  font-size: var(--font-def-title);
  font-weight: 800;
  margin: 0;
  color: var(--text-dark);
}

.enrichment-row {
  margin-top: 5px;
  font-size: 1rem;
  color: #333;
}

.solution-count {
  color: var(--text-gray);
  font-size: 0.9rem;
  margin-top: 10px;
  border-top: 1px solid #dadce0;
  padding-top: 8px;
}

 
.sort-toggle-btn {
  background: linear-gradient(to bottom, #ffffff 0%, #f1f3f4 100%);
  color: #1a73e8 !important;
  border: 1px solid #dadce0;
  padding: 12px 20px;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  width: 100%;
  margin: 10px 0 20px 0;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  border-bottom: 3px solid #ccc;
  transition: all 0.2s;
}

.sort-toggle-btn:active {
  transform: translateY(2px);
  border-bottom: 1px solid #ccc;
  box-shadow: 0 2px 3px rgba(0,0,0,0.1);
}

 
.group-title {
  margin: 1.5rem 0 0.5rem;
  padding: 0.6rem 1rem;
  font-size: var(--font-group-title);
  background: #f1f6fc;
  border-right: 6px solid #1a3a5f;
  font-weight: 800;
  color: #1a3a5f;
}

.letters-title {
  margin: 1rem 0 0.3rem;
  padding: 0.3rem 0.8rem;
  font-size: var(--font-letters-title);
  background: #fff4cc;
  border-right: 4px solid #f0c94a;
  display: inline-block;
  font-weight: 700;
  color: #856404;
}

 
.solution-item {
  display: flex;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid #f1f3f4;
  gap: 10px;
  flex-wrap: wrap;
}

.heb {
  font-size: var(--font-heb-word);
  font-weight: 800;
  color: var(--link-blue);
  text-decoration: underline;
  margin-left: 0.5rem;
}

.niqqud {
  font-size: var(--font-niqqud);
  font-weight: 600;
  color: #333;
}

.en {
  font-size: var(--font-en-word);
  color: var(--link-blue);
  text-decoration: underline;
}

.icon-group {
  display: inline-flex;
  gap: 5px;
  align-items: center;
}

.icon {
  width: var(--icon-size);
  height: var(--icon-size);
  vertical-align: middle;
}

 
.footer-separator {
  margin-top: auto;  
  padding-top: 20px;
  border-top: 1px solid #eee;
}

.footer-text {
  font-size: 0.85rem;
  color: var(--text-gray);
  text-align: center;
  padding: 20px 0;
  line-height: 1.6;
}

 
.modal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
}

.modal-content {
  background-color: #fff;
  margin: 5% auto;
  padding: 25px;
  border-radius: 12px;
  max-width: 500px;
  width: 85%;
  position: relative;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  direction: rtl;
}

.close-modal {
  position: absolute; left: 15px; top: 10px;
  font-size: 28px; cursor: pointer; color: #aaa;
}

.main-title { font-size: 1.4rem; font-weight: 800; color: #000; text-align: center; }
.sub-title { font-size: 1rem; color: #666; text-align: center; margin-bottom: 20px; }

.feedback-options {
  background: #f8f9fa;
  padding: 10px;
  border-radius: 8px;
  border-right: 4px solid var(--link-blue);
  margin-bottom: 20px;
  display: flex; flex-direction: column; gap: 5px;
}

.option-row, .legal-row {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; padding: 4px 0;
}

.legal-row span { font-size: 0.8rem; color: #555; line-height: 1.3; }

textarea {
  width: 100%; border: 1px solid #dadce0; border-radius: 6px;
  padding: 10px; font-family: inherit; resize: none; box-sizing: border-box;
}

.char-counter { font-size: 0.7rem; color: #999; text-align: left; margin-top: 2px; }

.submit-btn {
  background: var(--link-blue); color: white; border: none; padding: 12px;
  border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.1rem;
  font-weight: bold; margin-top: 20px;
}

.submit-btn:disabled { background: #dadce0; cursor: not-allowed; }

 
#successMessage {
  text-align: center;
  padding: 15px;
  border-top: 1px solid #eee;
}

.success-text {
  color: #2e7d32;
  font-weight: bold;
  font-size: 1.1rem;
}

.serial-text {
  color: var(--link-blue);
  font-weight: bold;
  margin-top: 8px;
}

.modal-footer-links {
  margin-top: 20px;
  text-align: center;
  border-top: 1px solid #eee;
  padding-top: 10px;
}

.modal-footer-links a {
  color: var(--link-blue);
  text-decoration: underline;
  font-weight: bold;
}
