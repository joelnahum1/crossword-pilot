<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מאגר פתרונות תשבצים - מעקב פניות</title>
  <style>
    /*************************************************** הגדרות CSS מקוריות */
    :root {
      --font-main-title: 1.8rem;
      --font-sub-title: 1.5rem;
      --link-blue: #007bff;
      --bg-main: #f2f4f7;
      --bg-white: #fff;
      --text-dark: #202124;
      --max-page-width: 760px;
    }
    * { font-family: "Heebo", sans-serif !important; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; background: var(--bg-main); direction: rtl; text-align: right; }
    
    /* המעטפת של הדף לפי העיצוב שלך */
    .page { max-width: var(--max-page-width); margin: 0 auto; padding: 1rem 1.2rem; background: var(--bg-white); min-height: 100vh; }
    
    h1 { text-align: center; color: var(--text-dark); margin-bottom: 5px; font-size: var(--font-main-title); }
    .sub-title { text-align: center; color: var(--text-dark); margin-bottom: 25px; font-size: var(--font-sub-title); font-weight: bold; }
    .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--link-blue); font-weight: bold; }
    
    /* כפתור פתח/סגור הכל - סעיף 1+2+3 */
    .controls { text-align: right; margin-bottom: 15px; }
    .toggle-all { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--link-blue); font-weight: bold; display: flex; align-items: center; padding: 0; text-decoration: none; }
    .toggle-all:hover { text-decoration: underline; }
    
    /* עיצוב המשולש בכחול-לבן - סעיף 4+5 */
    .icon-square { width: 22px; height: 22px; flex-shrink: 0; background: var(--link-blue); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-left: 12px; font-size: 14px; transition: transform 0.3s ease; transform: rotate(-90deg); }
    
    /* סיבוב למטה כשהרשומה (או הכפתור הראשי) במצב פתוח */
    .ticket.open .icon-square, .toggle-all.active .icon-square { transform: rotate(-180deg); }
    
    /* עיצוב הרשומות */
    .ticket { background: #fff; border-radius: 8px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.1); border-right: 10px solid #bdc3c7; overflow: hidden; }
    .ticket-header { padding: 12px; cursor: pointer; display: flex; align-items: center; text-align: right; font-weight: bold; }
    .header-text { flex-grow: 1; font-size: 0.95rem; line-height: 1.4; }
    
    .ticket-body { display: none; padding: 20px; background: #ffffff; line-height: 1.6; text-align: right; border-top: 1px solid rgba(0,0,0,0.1); overflow-wrap: break-word; }
    .ticket.open .ticket-body { display: block; }
    .user-content { color: #333; white-space: pre-wrap; font-style: normal; }
    
    .separator { height: 1px; background: #eee; margin: 15px 0; }
    .system-response-section { padding: 12px; border-right: 4px solid var(--link-blue); background: #ebf5fb; color: var(--link-blue); border-radius: 4px 0 0 4px; font-weight: bold; }
    
    @media (max-width: 600px) {
      .page { padding: 10px 5px; }
      .header-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back-link">← חזרה לדף הראשי</a>
    <h1>מאגר פתרונות תשבצים</h1>
    <div class="sub-title">מעקב פניות וסטטוסים</div>
    
    <div class="controls">
      <button id="mainToggleButton" class="toggle-all" onclick="toggleAll()">
        <div class="icon-square">▲</div>
        <span id="btnText">פתח את כל הרשומות</span>
      </button>
    </div>
    <div id="tickets-container">טוען נתונים...</div>
  </div>
  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxg4zdc-3RmM5Mpu4pqmYSD-oV91vqPGsVCbS22cyIce9_rdZFhMIdBCjhZaY1alkVF/exec";
    let allOpen = false;
    async function loadTickets() {
      const container = document.getElementById("tickets-container");
      try {
        const response = await fetch(webAppUrl);
        const data = await response.json();
        if (!data || data.length === 0) {
          container.innerHTML = "<p style='text-align:center;'>אין פניות להצגה.</p>";
          return;
        }
        container.innerHTML = "";
        data.forEach(ticket => {
          const div = document.createElement("div");
          div.className = "ticket";
          if (ticket.status === "NEW") div.style.borderRightColor = "#3498db";
          else if (ticket.status === "APPROVED") div.style.borderRightColor = "#2ecc71";
          else if (ticket.status === "REJECTED") div.style.borderRightColor = "#e74c3c";
          div.innerHTML = '<div class="ticket-header" onclick="toggleTicket(this)"><div class="icon-square">▲</div><span class="header-text">#' + ticket.id + ' | ' + ticket.date + ' | ' + ticket.topic + '</span></div>' +
                          '<div class="ticket-body"><div class="user-content">' + ticket.content + '</div>' +
                          (ticket.note ? '<div class="separator"></div><div class="system-response-section">תשובת המערכת:<br><div style="font-weight:normal; margin-top:5px; color:#444;">' + ticket.note + '</div></div>' : '') +
                          '</div>';
          container.appendChild(div);
        });
      } catch (e) { container.innerHTML = "שגיאה בטעינה."; }
    }
    function toggleTicket(header) { header.parentElement.classList.toggle("open"); }
    function toggleAll() {
      const btn = document.getElementById("mainToggleButton");
      const btnText = document.getElementById("btnText");
      allOpen = !allOpen;
      document.querySelectorAll(".ticket").forEach(t => { if (allOpen) t.classList.add("open"); else t.classList.remove("open"); });
      btnText.innerText = allOpen ? "סגור את כל הרשומות" : "פתח את כל הרשומות";
      if (allOpen) btn.classList.add("active"); else btn.classList.remove("active");
    }
    window.onload = loadTickets;
  </script>
</body>
</html>
